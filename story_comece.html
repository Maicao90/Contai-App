    /* Uma camada suave para a letra branca se destacar no topo */

      position: absolute;
      top: 0; left: 0; right: 0; height: 50%;
      background: linear-gradient(180deg, rgba(2,6,23,0.95) 0%, transparent 100%);
      z-index: 2;
    }

    .mask-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 35%;
      background: linear-gradient(0deg, #050b12 80%, transparent 100%);
      z-index: 2;
    }

    .content {
      position: absolute;
      top: 15px;
      left: 10px;
      right: 10px;
      z-index: 10;
      text-align: center;
    }

    .title {
      font-family: 'Montserrat', sans-serif;
      font-size: 38px;
      font-weight: 900;
      line-height: 1.1;
      text-transform: uppercase;
      margin: 0 0 10px 0;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
      background: linear-gradient(to right, #ffffff, #a7f3d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 17px;
      color: #e2e8f0;
      font-weight: 500;
      line-height: 1.5;
      padding: 0 10px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }
    
    .cta-area {
      position: absolute;
      bottom: 50px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .arrow-down {
      font-size: 24px;
      margin-bottom: 10px;
      color: #10b981;
      animation: bounce 2s infinite;
      text-shadow: 0 2px 5px rgba(0,0,0,0.5);
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }

    .btn-wpp {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 20px;
      padding: 16px 32px;
      border-radius: 40px;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
      border: 2px solid rgba(255,255,255,0.2);
    }

    .btn-desc {
      margin-top: 15px;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

  <div class="story-container">

    <div class="content">
      <h1 class="title">Faça o Teste<br>Agora</h1>
      <p class="subtitle">Você no controle total do seu dinheiro, direto na sua palma da mão.</p>
    </div>

    <div class="cta-area">
      <div class="arrow-down">👇🏿👇🏽👇🏻</div>
      <div class="btn-wpp">💬 COMECE AQUI</div>
      <div class="btn-desc">Clique no link e fale com a IA</div>
    </div>
  </div>
