openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: ProspectaLP API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: leads
    description: Lead management
  - name: campaigns
    description: Campaign management
  - name: dashboard
    description: Dashboard stats
  - name: mining
    description: Lead mining operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard KPI and funnel stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/recent-leads:
    get:
      operationId: getRecentLeads
      tags: [dashboard]
      summary: Get recent leads for dashboard
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List all campaigns
      responses:
        "200":
          description: Campaigns list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Campaign"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create a new campaign and start mining
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignRequest"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get a campaign by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCampaign
      tags: [campaigns]
      summary: Delete a campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads
      parameters:
        - name: campanhaId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [Novo, Contatado, Convertido]
        - name: temperatura
          in: query
          schema:
            type: string
            enum: [Frio, Morno, Quente]
        - name: nicho
          in: query
          schema:
            type: string
        - name: cidade
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a lead manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadRequest"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"

  /leads/{id}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a lead by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadRequest"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/{id}/message:
    get:
      operationId: getLeadMessage
      tags: [leads]
      summary: Get WhatsApp outreach message for a lead
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Outreach message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mine:
    post:
      operationId: mineLeads
      tags: [mining]
      summary: Mine leads for a niche and city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MineRequest"
      responses:
        "200":
          description: Mining results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MineResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LeadStatus:
      type: string
      enum: [Novo, Contatado, Convertido]

    LeadTemperatura:
      type: string
      enum: [Frio, Morno, Quente]

    CampaignStatus:
      type: string
      enum: [Ativa, Concluída, Pausada]

    Campaign:
      type: object
      properties:
        id:
          type: integer
        nome:
          type: string
        nicho:
          type: string
        cidade:
          type: string
        uf:
          type: string
        status:
          $ref: "#/components/schemas/CampaignStatus"
        taxaConversao:
          type: number
          nullable: true
        totalLeads:
          type: integer
        dataCriacao:
          type: string
          format: date-time
      required:
        - id
        - nome
        - nicho
        - cidade
        - uf
        - status
        - totalLeads
        - dataCriacao

    CreateCampaignRequest:
      type: object
      properties:
        nome:
          type: string
        nicho:
          type: string
        cidade:
          type: string
        uf:
          type: string
      required:
        - nome
        - nicho
        - cidade
        - uf

    Lead:
      type: object
      properties:
        id:
          type: integer
        campanhaId:
          type: integer
          nullable: true
        nomeEmpresa:
          type: string
        nicho:
          type: string
        cidade:
          type: string
        telefone:
          type: string
          nullable: true
        whatsapp:
          type: string
          nullable: true
        urlOrigem:
          type: string
          nullable: true
        temSite:
          type: boolean
        urlSite:
          type: string
          nullable: true
        temPixelMeta:
          type: boolean
        temPixelGoogle:
          type: boolean
        score:
          type: integer
        temperatura:
          $ref: "#/components/schemas/LeadTemperatura"
        status:
          $ref: "#/components/schemas/LeadStatus"
        dataCadastro:
          type: string
          format: date-time
      required:
        - id
        - nomeEmpresa
        - nicho
        - cidade
        - temSite
        - temPixelMeta
        - temPixelGoogle
        - score
        - temperatura
        - status
        - dataCadastro

    CreateLeadRequest:
      type: object
      properties:
        campanhaId:
          type: integer
          nullable: true
        nomeEmpresa:
          type: string
        nicho:
          type: string
        cidade:
          type: string
        telefone:
          type: string
          nullable: true
        whatsapp:
          type: string
          nullable: true
        urlOrigem:
          type: string
          nullable: true
        temSite:
          type: boolean
        urlSite:
          type: string
          nullable: true
        temPixelMeta:
          type: boolean
        temPixelGoogle:
          type: boolean
      required:
        - nomeEmpresa
        - nicho
        - cidade

    UpdateLeadRequest:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/LeadStatus"
        temperatura:
          $ref: "#/components/schemas/LeadTemperatura"
        nomeEmpresa:
          type: string
        nicho:
          type: string
        cidade:
          type: string
        telefone:
          type: string
          nullable: true
        whatsapp:
          type: string
          nullable: true
        temSite:
          type: boolean
        urlSite:
          type: string
          nullable: true
        temPixelMeta:
          type: boolean
        temPixelGoogle:
          type: boolean
        campanhaId:
          type: integer
          nullable: true

    DashboardStats:
      type: object
      properties:
        totalLeads:
          type: integer
        contatados:
          type: integer
        convertidos:
          type: integer
        receitaPotencial:
          type: number
        totalCampanhas:
          type: integer
        funil:
          type: object
          properties:
            novo:
              type: integer
            contatado:
              type: integer
            convertido:
              type: integer
          required:
            - novo
            - contatado
            - convertido
        porTemperatura:
          type: object
          properties:
            quente:
              type: integer
            morno:
              type: integer
            frio:
              type: integer
          required:
            - quente
            - morno
            - frio
      required:
        - totalLeads
        - contatados
        - convertidos
        - receitaPotencial
        - totalCampanhas
        - funil
        - porTemperatura

    LeadMessage:
      type: object
      properties:
        mensagem:
          type: string
        whatsappUrl:
          type: string
          nullable: true
        promptDemo:
          type: string
      required:
        - mensagem
        - promptDemo

    MineRequest:
      type: object
      properties:
        nicho:
          type: string
        cidade:
          type: string
        campanhaId:
          type: integer
          nullable: true
      required:
        - nicho
        - cidade

    MineResult:
      type: object
      properties:
        found:
          type: integer
        leads:
          type: array
          items:
            $ref: "#/components/schemas/Lead"
        message:
          type: string
      required:
        - found
        - leads
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
